<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen font-['Inter']">

    <!-- HEADER -->
    <header class="md:w-9/12 mx-auto w-11/12 pt-10">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h2 class="font-bold text-4xl text-slate-800 mb-6">
                <i class="fa-solid fa-briefcase text-blue-600 mr-2"></i>
                Job Application Tracker
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                <div class="bg-blue-50 p-6 rounded-xl text-center shadow-sm">
                    <h1 class="text-gray-600 font-semibold">Total Jobs</h1>
                    <p id="allCount" class="text-3xl font-bold text-blue-600 mt-2">8</p>
                </div>

                <div class="bg-green-50 p-6 rounded-xl text-center shadow-sm">
                    <h1 class="text-gray-600 font-semibold">Interview</h1>
                    <p id="interviewCount" class="text-3xl font-bold text-green-600 mt-2">2</p>
                </div>

                <div class="bg-red-50 p-6 rounded-xl text-center shadow-sm">
                    <h1 class="text-gray-600 font-semibold">Rejected</h1>
                    <p id="rejectCount" class="text-3xl font-bold text-red-600 mt-2">1</p>
                </div>

            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="md:w-9/12 mx-auto w-11/12 mt-10">

        <!-- Section Header -->
        <div class="flex flex-col md:flex-row justify-between md:items-center mb-6">
            <h2 class="font-bold text-3xl text-slate-800">
                Available Jobs
            </h2>
            <p class="font-semibold text-gray-600 mt-2 md:mt-0">
                <span id="jobCount" class="text-blue-600 font-bold">8</span> Jobs
            </p>
        </div>

        <!-- Filter Buttons -->
        <div class="flex gap-3 flex-wrap mb-8">
            <button class="btn rounded-full bg-blue-600 text-white hover:bg-blue-700 px-8">
                All
            </button>

            <button class="btn rounded-full bg-gray-200 text-gray-700 hover:bg-green-100 px-8">
                Interview
            </button>

            <button class="btn rounded-full bg-gray-200 text-gray-700 hover:bg-red-100 px-8">
                Rejected
            </button>
        </div>

        <!-- Job Cards -->
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- Card 1 -->
            <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition duration-300">
                <h3 class="text-xl font-bold text-slate-800">Frontend Developer</h3>
                <p class="text-gray-500 mt-1">Tech Solutions Ltd</p>

                <div class="flex justify-between items-center mt-4">
                    <span class="badge badge-success">Interview</span>
                    <button class="btn btn-sm btn-outline btn-primary">Details</button>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition duration-300">
                <h3 class="text-xl font-bold text-slate-800">Backend Developer</h3>
                <p class="text-gray-500 mt-1">Code Factory</p>

                <div class="flex justify-between items-center mt-4">
                    <span class="badge badge-error">Rejected</span>
                    <button class="btn btn-sm btn-outline btn-primary">Details</button>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition duration-300">
                <h3 class="text-xl font-bold text-slate-800">UI/UX Designer</h3>
                <p class="text-gray-500 mt-1">Creative Studio</p>

                <div class="flex justify-between items-center mt-4">
                    <span class="badge badge-warning">Pending</span>
                    <button class="btn btn-sm btn-outline btn-primary">Details</button>
                </div>
            </div>

        </div>

        <!-- Empty State -->
        <div id="empty-state"
            class="hidden text-center bg-white p-10 rounded-2xl shadow-lg md:w-6/12 mx-auto mt-10">
            <img class="w-32 mx-auto mb-4" src="./img/jobs.png" alt="">
            <h3 class="text-xl font-semibold text-gray-700">No jobs available</h3>
            <p class="text-gray-500 mt-2">Check back soon for new job opportunities</p>
        </div>

    </main>

</body>

</html>
